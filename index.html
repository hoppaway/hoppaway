<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── SEO ─── -->
    <title>HoppAway — Hop. Plan. Go.</title>
    <meta name="description" content="Plan your backpacking trip in seconds with AI. Real hostels, exact trains, street food and day-by-day itineraries for any budget. Free, no sign-up needed." />
    <meta name="keywords" content="AI travel planner, backpacking itinerary, budget travel planner, interrail route planner, backpacking Europe, trip planner AI" />
    <link rel="canonical" href="https://hoppaway.app/" />

    <!-- ─── OPEN GRAPH (Facebook, WhatsApp, LinkedIn) ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hoppaway.app/" />
    <meta property="og:title" content="HoppAway — AI Travel Planner for Budget Backpackers" />
    <meta property="og:description" content="Plan your backpacking trip in seconds with AI. Real hostels, exact trains, street food and day-by-day itineraries for any budget." />
    <meta property="og:image" content="https://hoppaway.app/og-image.png" />
    <meta property="og:site_name" content="HoppAway" />
    <meta property="og:locale" content="en_US" />

    <!-- ─── TWITTER CARD ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://hoppaway.app/" />
    <meta name="twitter:title" content="HoppAway — AI Travel Planner for Budget Backpackers" />
    <meta name="twitter:description" content="Plan your backpacking trip in seconds with AI. Real hostels, exact trains, street food and day-by-day itineraries for any budget." />
    <meta name="twitter:image" content="https://hoppaway.app/og-image.png" />

    <!-- ─── MISC ─── -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="HoppAway" />
    <meta name="theme-color" content="#1a1208" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #faf7f2; }
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #faf7f2;
        display: flex; align-items: center; justify-content: center;
      }
      #splash-logo {
        font-family: Georgia, serif;
        font-size: 2rem; font-weight: 700;
        color: #1a1208; letter-spacing: -0.03em;
      }
      #splash-logo span { color: #c94f1e; font-style: italic; }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">Hopp<span>Away</span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove splash once React has rendered
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').children.length > 0) {
            var splash = document.getElementById('splash');
            if (splash) splash.remove();
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
</html>
